<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Ausi Lebo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

/* 🌸 BACKGROUND IMAGE */
body{
    margin:0;
    font-family:'Poppins','Segoe UI',sans-serif;

    background-image: url("15.jpeg"); /* ✅ your background image */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    min-height:100vh;
    padding:40px 15px;
    position:relative;
}

/* 🔥 dark overlay for readability */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.45);
    z-index:-1;
}

/* MAIN CARD */
.container-card{
    max-width:1100px;
    margin:auto;
    background: rgba(255,255,255,0.92);
    border-radius:25px;
    padding:40px 25px;
    box-shadow:0 20px 60px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
}

/* TITLES */
.small-title{
    text-align:center;
    font-size:1rem;
    color:#ff6b81;
    letter-spacing:3px;
}

.main-title{
    text-align:center;
    font-size:3.2rem;
    font-weight:900;
    color:#222;
}

.sub-title{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

/* MESSAGE */
.message{
    background:#fff5f7;
    border-left:6px solid #ff6b81;
    padding:25px;
    border-radius:15px;
    line-height:1.8;
}

/* BUTTON */
.reveal-btn{
    display:block;
    margin:30px auto;
    padding:12px 30px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff6b81,#ff4757);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.reveal-btn:hover{
    transform:scale(1.05);
}

/* GALLERY */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

/* 🃏 CARD */
.card{
    width:200px;
    border-radius:18px;
    overflow:hidden;
    background:white;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
    opacity:0;
    animation:fadeUp 0.6s forwards;
    transition:0.3s;
}

/* 🃏 CARD HOVER */
.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* 🖼️ IMAGE INSIDE CARD */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
    transition:0.5s ease;
}

/* 🔥 IMAGE HOVER (ZOOM INSIDE CARD) */
.card img:hover{
    transform:scale(1.25);
    filter:brightness(1.1);
}

/* TEXT */
.card p{
    padding:10px;
    margin:0;
    text-align:center;
    font-size:0.85rem;
    color:#555;
}

/* ANIMATION */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(25px);}
    to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:600px){
    .main-title{font-size:2.2rem;}
    .card{width:150px;}
}

</style>
</head>

<body>

<div class="container-card">

    <div class="small-title">🎉 SPECIAL BIRTHDAY 🎉</div>
    <div class="main-title">Ausi Lebo</div>
    <div class="sub-title">A gift of love & memories ❤️</div>

    <div class="message">
        <p><b>Happy Birthday ❤️</b></p>
        <p>You are a beautiful soul with a kind heart.</p>
        <p>May your life be filled with happiness, success, and peace.</p>
        <p>You deserve all the best things in life 🌸</p>
        <p><i>— With love</i></p>
    </div>

    <button class="reveal-btn" id="btn">Open Your Memories ✨</button>

    <div class="gallery" id="gallery"></div>

</div>

<script>

const gallery = document.getElementById("gallery");
const btn = document.getElementById("btn");

const messages = [
"Beautiful soul","Forever loved","Keep shining","Pure heart",
"Birthday queen","Precious memory","Gentle spirit","Amazing sister",
"Joy always","Special moment","Peace & love","Wonderful you",
"Smile always","Blessed life","Loved forever"
];

let opened = false;

btn.addEventListener("click", () => {

if(opened) return;

for(let i=1;i<=15;i++){

    const div = document.createElement("div");
    div.className = "card";
    div.style.animationDelay = (i*0.05)+"s";

    const img = document.createElement("img");
    img.src = `${i}.jpeg`;

    // fallback image if missing
    img.onerror = () => img.src = "15.jpeg";

    const p = document.createElement("p");
    p.innerText = messages[i-1];

    div.appendChild(img);
    div.appendChild(p);
    gallery.appendChild(div);
}

opened = true;

confetti({
    particleCount:150,
    spread:90,
    origin:{y:0.6}
});

btn.innerText = "Memories Unlocked ❤️";

});

</script>

</body>
</html>
