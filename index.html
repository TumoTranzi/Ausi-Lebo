<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Ausi Lebo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
body{
    margin:0;
    font-family: 'Poppins', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#fdf6f0,#f7efe8,#fff);
    min-height:100vh;
    padding:40px 15px;
}

/* soft floating glow */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top,#ffd6e0 0%,transparent 40%),
                radial-gradient(circle at bottom,#d6f0ff 0%,transparent 40%);
    opacity:0.6;
    z-index:-1;
}

.container-card{
    max-width:1100px;
    margin:auto;
    background:white;
    border-radius:30px;
    padding:40px 25px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

.small-title{
    text-align:center;
    font-size:1.2rem;
    color:#c97b63;
    letter-spacing:2px;
}

.main-title{
    text-align:center;
    font-size:3.2rem;
    font-weight:800;
    color:#2c2c2c;
    margin:10px 0;
}

.sub-title{
    text-align:center;
    color:#777;
    margin-bottom:30px;
}

/* message */
.message{
    background:#fff7f2;
    border-left:5px solid #ffb199;
    padding:25px;
    border-radius:20px;
    color:#444;
    line-height:1.7;
}

/* button */
.reveal-btn{
    display:block;
    margin:30px auto;
    padding:12px 28px;
    border:none;
    border-radius:50px;
    background:linear-gradient(90deg,#ffb199,#ff0844);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.reveal-btn:hover{
    transform:scale(1.05);
}

/* gallery */
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:200px;
    border:none;
    border-radius:20px;
    overflow:hidden;
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.06);
    transition:0.3s;
    opacity:0;
    animation:fadeUp 0.6s forwards;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card p{
    padding:10px;
    margin:0;
    text-align:center;
    font-size:0.85rem;
    color:#555;
}

/* animation */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* mobile */
@media(max-width:600px){
    .main-title{font-size:2.2rem;}
    .card{width:150px;}
}
</style>
</head>

<body>

<div class="container-card">

    <div class="small-title">🎉 A SPECIAL DAY 🎉</div>
    <div class="main-title">Ausi Lebo</div>
    <div class="sub-title">A little gift of memories & love ❤️</div>

    <div class="message">
        <p><b>Happy Birthday ❤️</b></p>
        <p>You are one of the most beautiful souls. Today is all about you.</p>
        <p>May your life be filled with peace, success, love, and happiness.</p>
        <p>You deserve everything beautiful in this world 🌸</p>
        <p><i>— With love</i></p>
    </div>

    <button class="reveal-btn" id="btn">Open Your Memories ✨</button>

    <div class="gallery" id="gallery"></div>

</div>

<script>

const gallery = document.getElementById("gallery");
const btn = document.getElementById("btn");

const messages = [
"Beautiful soul","Forever loved","Keep shining","Pure heart",
"Birthday queen","Precious memory","Gentle spirit","Amazing sister",
"Joy always","Special moment","Peace & love","Wonderful you",
"Smile always","Blessed life","Loved forever"
];

let opened = false;

btn.addEventListener("click", () => {

if(opened) return;

for(let i=1;i<=15;i++){

const div = document.createElement("div");
div.className = "card";
div.style.animationDelay = (i*0.05)+"s";

const img = document.createElement("img");
img.src = `${i}.jpeg`;
img.onerror = () => img.src = "15.jpeg";

const p = document.createElement("p");
p.innerText = messages[i-1];

div.appendChild(img);
div.appendChild(p);
gallery.appendChild(div);
}

opened = true;

confetti({
particleCount:120,
spread:80,
origin:{y:0.6}
});

btn.innerText = "Memories Opened ❤️";
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
